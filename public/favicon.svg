<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#0f0f0f" rx="40"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradientFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circular accent -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#gradientFill)" stroke-width="3" opacity="0.3"/>
  
  <!-- Main "3" shape -->
  <text 
    x="100" 
    y="130" 
    font-size="120" 
    font-weight="700" 
    font-family="Poppins, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    fill="url(#gradientFill)" 
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="-5"
  >
    3
  </text>
  
  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="4" fill="url(#gradientFill)" opacity="0.6"/>
  <circle cx="150" cy="150" r="4" fill="url(#gradientFill)" opacity="0.6"/>
</svg>